<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} | Unique Paper Converting Machines</title>
    <meta name="description" content="{{ product.description }} Unique Paper Converting Machines offers high-performance {{ product.name }} for industrial paper production." />
    <meta name="keywords" content="{{ product.name }}, {{ product.model }}, tissue machine, paper converting, napkin machine" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="product" />
    <meta property="og:url" content="https://ais-pre-zxncjpgfyfw4spyple2uzq-291374866791.asia-east1.run.app/product/{{ product.id }}" />
    <meta property="og:title" content="{{ product.name }} | Unique Paper Converting Machines" />
    <meta property="og:description" content="{{ product.description }}" />
    <meta property="og:image" content="{{ product.image }}" />

    <link rel="canonical" href="https://ais-pre-zxncjpgfyfw4spyple2uzq-291374866791.asia-east1.run.app/product/{{ product.id }}" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        industrial: {
                            accent: '#0197b2',
                            yellow: '#FACC15',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .text-gradient {
            background: linear-gradient(to right, #0197b2, #FACC15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="bg-white text-slate-900 font-sans">

    <nav class="fixed top-0 left-0 w-full z-[1000] py-4 bg-white/90 backdrop-blur-xl border-b border-slate-200 shadow-sm">
        <div class="container mx-auto px-6 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="/input_file_94.png" alt="Logo" class="h-10 w-auto object-contain">
            </a>
            <a href="/" class="text-sm font-bold text-industrial-accent hover:underline">← Back to Home</a>
        </div>
    </nav>

    <main class="pt-32 pb-24">
        <div class="container mx-auto px-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div class="glass-card p-8 bg-slate-50">
                    <img src="{{ product.image }}" alt="{{ product.name }}" class="w-full h-auto object-contain">
                </div>
                <div>
                    <span class="text-industrial-accent font-bold uppercase tracking-widest text-sm mb-4 block">{{ product.model if product.model else 'Industrial Grade' }}</span>
                    <h1 class="text-4xl md:text-5xl font-display font-bold text-slate-900 mb-6">{{ product.name }}</h1>
                    <p class="text-slate-600 text-lg mb-8 leading-relaxed">{{ product.description }}</p>
                    
                    <div class="space-y-6 mb-10">
                        <h3 class="text-xl font-bold text-slate-900 border-b border-slate-100 pb-2">Key Specifications</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {% for feature in product.features %}
                            <div class="flex items-center gap-3 p-4 glass-card bg-white">
                                <div class="w-2 h-2 rounded-full bg-industrial-accent"></div>
                                <span class="text-sm font-medium text-slate-700">{{ feature }}</span>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <button class="w-full sm:w-auto px-12 py-4 bg-industrial-accent text-white font-bold rounded-full hover:shadow-xl transition-all">Request Price Quote</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-50 border-t border-slate-200 py-12">
        <div class="container mx-auto px-6 text-center">
            <p class="text-slate-500 text-sm">© 2026 Unique Paper Converting Machines.</p>
        </div>
    </footer>

</body>
</html>
